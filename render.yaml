services:
  - type: web
    name: nestjs-audit-service
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 7004
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard (Atlas URI)
      - key: MONGO_DB_NAME
        value: audit_logs
      - key: REDIS_URL
        sync: false          # set manually — e.g. Render Key Value / Redis Cloud URL
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TIMEOUT
        value: 5000
      - key: REDIS_RETRIES
        value: 3
      - key: COOKIE_SECRET
        sync: false
      - key: COOKIE_SAMESITE
        value: lax
      - key: COOKIE_EXPIRATION
        value: 86400000
      - key: CORS_ORIGINS
        sync: false
      - key: API_KEYS
        sync: false
    autoDeploy: true